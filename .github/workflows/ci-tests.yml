name: Automated Tests — Unity 6.3 LTS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # [需查證] Unity 6.3 LTS image tag — verify against installed editor version
  # Current: unityci/editor:ubuntu-6.3.x-linux-il2cpp
  UNITY_VERSION: "6.3.x"

jobs:
  test-editmode:
    name: EditMode Tests (Unit Logic)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library (warm incremental compile)
        uses: actions/cache@v4
        with:
          path: Library/
          key: Library-editmode-${{ hashFiles('Assets/**/*.asmdef') }}
          restore-keys: |
            Library-editmode-

      - name: Run EditMode Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: editmode
          artifactsPath: test-results/editmode
          checkName: EditMode Test Results

      - name: Upload EditMode Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editmode-test-results
          path: test-results/editmode/

  test-playmode:
    name: PlayMode Tests (Integration)
    runs-on: ubuntu-latest
    needs: test-editmode

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library/
          key: Library-playmode-${{ hashFiles('Assets/**/*.asmdef') }}
          restore-keys: |
            Library-playmode-

      - name: Run PlayMode Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: playmode
          artifactsPath: test-results/playmode
          checkName: PlayMode Test Results

      - name: Upload PlayMode Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playmode-test-results
          path: test-results/playmode/

  report:
    name: Test Report
    runs-on: ubuntu-latest
    if: always()
    needs: [test-editmode, test-playmode]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-test-results/

      - name: Test Summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **EditMode**: $([ -d all-test-results/editmode-test-results ] && echo '✓ Collected' || echo '✗ Not found')" >> $GITHUB_STEP_SUMMARY
          echo "- **PlayMode**: $([ -d all-test-results/playmode-test-results ] && echo '✓ Collected' || echo '✗ Not found')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts available for review in Actions tab." >> $GITHUB_STEP_SUMMARY

      - name: Fail if tests failed
        run: |
          if [ "${{ needs.test-editmode.result }}" == "failure" ] || [ "${{ needs.test-playmode.result }}" == "failure" ]; then
            echo "❌ Test suite failed — merge blocked"
            exit 1
          else
            echo "✅ All tests passed"
          fi
